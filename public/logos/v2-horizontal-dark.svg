<svg xmlns="http://www.w3.org/2000/svg" width="320" height="72" viewBox="0 0 320 72" fill="none">
  <title>Pablo De Luca — Logotipo horizontal sobre fondo marino</title>
  <desc>Variante para uso sobre fondos oscuros (marino). Monograma PD dorado + nombre blanco roto + ABOGADO dorado en Montserrat.</desc>

  <!-- Fondo marino -->
  <rect width="320" height="72" fill="#0E1B33"/>

  <!-- Monograma PD — dorado sobre marino -->
  <text
    x="12"
    y="46"
    font-family="'Playfair Display', 'Didot', 'Book Antiqua', 'Times New Roman', serif"
    font-size="28"
    font-weight="500"
    fill="#C9A45A"
    letter-spacing="-1.5"
  >P</text>
  <text
    x="27"
    y="46"
    font-family="'Playfair Display', 'Didot', 'Book Antiqua', 'Times New Roman', serif"
    font-size="28"
    font-weight="500"
    fill="#C9A45A"
    letter-spacing="0"
  >D</text>

  <!-- Sparkle dorado -->
  <g transform="translate(26.5, 17)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#C9A45A" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#C9A45A" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-2.2" y1="-2.2" x2="2.2" y2="2.2" stroke="#C9A45A" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="2.2" y1="-2.2" x2="-2.2" y2="2.2" stroke="#C9A45A" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Divisor vertical sutil -->
  <line x1="58" y1="16" x2="58" y2="56" stroke="#C9A45A" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Nombre: Pablo De Luca — blanco roto -->
  <text
    x="70"
    y="37"
    font-family="'Playfair Display', 'Didot', 'Book Antiqua', 'Times New Roman', serif"
    font-size="19"
    font-weight="500"
    fill="#F5F2EE"
    letter-spacing="-0.3"
  >Pablo De Luca</text>

  <!-- ABOGADO — dorado, Montserrat uppercase -->
  <text
    x="71"
    y="54"
    font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="9.5"
    font-weight="500"
    fill="#C9A45A"
    letter-spacing="3.2"
  >ABOGADO</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <title>PD — Dr. Pablo De Luca</title>
  <desc>Monograma PD con sparkle dorado. Marino oscuro con acento dorado.</desc>

  <!-- P serif — trazo grueso a la izquierda -->
  <text
    x="-2"
    y="50"
    font-family="'Playfair Display', 'Didot', 'Book Antiqua', 'Times New Roman', Georgia, serif"
    font-size="54"
    font-weight="500"
    fill="#0E1B33"
    letter-spacing="-3"
  >P</text>

  <!-- D serif — superpuesta / entrelazada (stroke compartido) -->
  <text
    x="22"
    y="50"
    font-family="'Playfair Display', 'Didot', 'Book Antiqua', 'Times New Roman', Georgia, serif"
    font-size="54"
    font-weight="500"
    fill="#0E1B33"
    letter-spacing="-2"
  >D</text>

  <!-- Sparkle de 4 puntas — esquina superior derecha -->
  <g stroke="#C9A45A" stroke-linecap="round">
    <line x1="49" y1="6" x2="49" y2="18" stroke-width="2"/>
    <line x1="43" y1="12" x2="55" y2="12" stroke-width="2"/>
    <line x1="45" y1="8" x2="53" y2="16" stroke-width="1.2"/>
    <line x1="53" y1="8" x2="45" y2="16" stroke-width="1.2"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <title>PD — Dr. Pablo De Luca (variante oscura)</title>
  <desc>Monograma PD con sparkle dorado. Fondo marino, letras doradas.</desc>

  <!-- Fondo marino con esquinas redondeadas -->
  <rect width="64" height="64" fill="#0E1B33" rx="6" ry="6"/>

  <!-- P serif grande — dorado sobre marino -->
  <text
    x="2"
    y="50"
    font-family="'Playfair Display', 'Didot', 'Book Antiqua', 'Times New Roman', Georgia, serif"
    font-size="54"
    font-weight="500"
    fill="#C9A45A"
    letter-spacing="-3"
  >P</text>

  <!-- D serif — superpuesta (stroke compartido) -->
  <text
    x="26"
    y="50"
    font-family="'Playfair Display', 'Didot', 'Book Antiqua', 'Times New Roman', Georgia, serif"
    font-size="54"
    font-weight="500"
    fill="#C9A45A"
    letter-spacing="-2"
  >D</text>

  <!-- Sparkle de 4 puntas — dorado, esquina superior derecha -->
  <g stroke="#C9A45A" stroke-linecap="round">
    <line x1="51" y1="8" x2="51" y2="20" stroke-width="2"/>
    <line x1="45" y1="14" x2="57" y2="14" stroke-width="2"/>
    <line x1="47" y1="10" x2="55" y2="18" stroke-width="1.2"/>
    <line x1="55" y1="10" x2="47" y2="18" stroke-width="1.2"/>
  </g>
</svg>
